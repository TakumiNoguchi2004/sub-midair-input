[project]
name = "english-search"
version = "0.1.0"
description = "英語入力サブシステム (スケルトン)"
requires-python = ">=3.12"
dependencies = [
    "midair-shared",
]

[tool.uv.sources]
midair-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/english_search"]
