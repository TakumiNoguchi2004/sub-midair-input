[project]
name = "japanese-search"
version = "0.1.0"
description = "日本語入力: かな漢字変換 (辞書ベースの最長一致セグメンテーション)"
requires-python = ">=3.12"
dependencies = [
    "midair-shared",
]

[tool.uv.sources]
midair-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/japanese_search"]
