[project]
name = "midair-shared"
version = "0.1.0"
description = "Shared base for mid-air input subsystems (encoder contract, FAISS utils, Searcher contract)"
requires-python = ">=3.12"
dependencies = [
    "faiss-cpu",
    "numpy",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/midair_shared"]
